<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Sukoon Lab</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0d0d0d;
color:white;
font-family:Arial,Helvetica,sans-serif;
}

.hero{

min-height:100vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

padding:30px;
text-align:center;

background:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.85)),
url('https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?auto=format&fit=crop&w=1400&q=80');

background-size:cover;
background-position:center;
}

.logo{

width:220px;
height:220px;
border-radius:50%;
border:3px solid #D4AF37;
box-shadow:0 0 40px rgba(212,175,55,.4);

margin-bottom:30px;

}

h1{

font-size:52px;
margin-bottom:10px;

}

.tagline{

font-size:22px;
color:#d4af37;
margin-bottom:20px;

}

.description{

max-width:700px;
line-height:1.7;
font-size:18px;
color:#dddddd;

}

.button{

display:inline-block;

margin-top:40px;

padding:16px 38px;

background:#D4AF37;

color:black;

text-decoration:none;

font-weight:bold;

border-radius:40px;

transition:.3s;

}

.button:hover{

transform:scale(1.05);

}

@media(max-width:768px){

.logo{

width:170px;
height:170px;

}

h1{

font-size:36px;

}

.tagline{

font-size:18px;

}

.description{

font-size:16px;

}

}

</style>

</head>

<body>

<section class="hero">

<img class="logo" src="Logo.jpg">

<h1>The Sukoon Lab</h1>

<div class="tagline">
Where Poetry Finds a New Voice
</div>

<div class="description">

Modern reimaginings of timeless Urdu poetry,
retro classics and soulful originals.

</div>

<a class="button" href="#">
Listen Now
</a>

</section>

</body>
</html>
