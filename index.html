<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sukoon Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>The Sukoon Lab</h1>
            <p>Modern Music. Timeless Poetry.</p>
            <a href="#" class="listen-btn">Listen Everywhere</a>
        </div>
    </header>

    <main class="container">
        <!-- Latest Release -->
        <section class="release-section">
            <h2>Latest Release</h2>
            <div class="release-card">
                <img src="Kuch_To_Hawa_Bhi_Sard_Thi_ParveenShakir_Cover_TheSukoonLab.jpg" alt="Latest Release">
                <div class="release-info">
                    <h3>Kuch To Hawa Bhi Sard Thi</h3>
                    <p>Poetry by Parveen Shakir</p>
                    <div class="platforms">
                        <a href="#">Spotify</a>
                        <a href="#">Apple Music</a>
                        <a href="#">YouTube</a>
                    </div>
                </div>
            </div>
        </section>

        <!-- Archive -->
        <section class="archive-section">
            <h2>The Archive</h2>
            <div class="archive-grid">
                <div class="archive-item">
                    <div class="img-placeholder"></div>
                    <p>Release 1</p>
                </div>
                <div class="archive-item">
                    <div class="img-placeholder"></div>
                    <p>Release 2</p>
                </div>
                <div class="archive-item">
                    <div class="img-placeholder"></div>
                    <p>Release 3</p>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
