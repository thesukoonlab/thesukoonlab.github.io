<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sukoon Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Hero Section -->
    <header class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>The Sukoon Lab</h1>
            <p>Modern Music. Timeless Poetry.</p>
            <a href="#" class="btn">Listen Everywhere</a>
        </div>
    </header>

    <!-- Latest Release -->
    <section class="section">
        <div class="container">
            <h2 class="section-title">Latest Release</h2>
            <div class="release-grid">
                <img src="Kuch_To_Hawa_Bhi_Sard_Thi_ParveenShakir_Cover_TheSukoonLab.jpg" alt="Latest Release" class="release-img">
                <div class="release-info">
                    <h3>Kuch To Hawa Bhi Sard Thi</h3>
                    <p>Poetry by Parveen Shakir</p>
                    <div class="platforms">
                        <a href="#">Spotify</a>
                        <a href="#">Apple Music</a>
                        <a href="#">YouTube</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Archive -->
    <section class="section archive">
        <div class="container">
            <h2 class="section-title">The Archive</h2>
            <div class="scroll-container">
                <div class="track">
                    <div class="card"><img src="placeholder.jpg" alt="Archive"><h3>Release 1</h3></div>
                    <div class="card"><img src="placeholder.jpg" alt="Archive"><h3>Release 2</h3></div>
                    <div class="card"><img src="placeholder.jpg" alt="Archive"><h3>Release 3</h3></div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
