<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>The Sukoon Lab</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{

background:#080808;
color:white;
font-family:Inter,sans-serif;

}

.hero{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

padding:30px;

text-align:center;

}

.logo{

width:170px;

border-radius:50%;

margin-bottom:25px;

box-shadow:0 0 50px rgba(212,175,55,.35);

}

h1{

font-family:'Cormorant Garamond',serif;

font-size:70px;

font-weight:600;

letter-spacing:2px;

margin-bottom:10px;

}

.tag{

font-size:24px;

color:#d4af37;

margin-bottom:25px;

}

.text{

max-width:650px;

line-height:1.8;

color:#bbbbbb;

margin-bottom:40px;

}

.btn{

display:inline-block;

padding:18px 42px;

background:#d4af37;

color:#111;

font-weight:bold;

text-decoration:none;

border-radius:50px;

transition:.3s;

}

.btn:hover{

transform:translateY(-3px);

}

footer{

padding:40px;

text-align:center;

color:#777;

font-size:14px;

}

@media(max-width:768px){

h1{

font-size:42px;

}

.tag{

font-size:18px;

}

.logo{

width:130px;

}

}
.platforms{

padding:80px 25px;

text-align:center;

}

.platforms h2{

font-family:'Cormorant Garamond',serif;

font-size:46px;

margin-bottom:40px;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

max-width:1000px;

margin:auto;

}

.grid a{

text-decoration:none;

background:#111;

padding:25px;

border:1px solid #d4af37;

border-radius:16px;

color:white;

font-size:20px;

transition:.3s;

}

.grid a:hover{

background:#d4af37;

color:#111;

transform:translateY(-5px);

}
</style>

</head>

<body>

<section class="hero">

<img src="Logo.jpg" class="logo">

<h1>The Sukoon Lab</h1>

<div class="tag">

Modern Music. Timeless Urdu Poetry.

</div>

<div class="text">

Bringing timeless Urdu poetry to a new generation through cinematic music, indie rock and soulful reinterpretations.

</div>

<a class="btn"

href="https://push.fm/fl/thesukoonlab"

target="_blank">

🎧 Listen Everywhere

</a>

</section>

<section class="platforms">

<h2>Official Platforms</h2>

<div class="grid">

<a href="https://open.spotify.com/artist/7iVKJNBCpjJNBDYlTeuj5M?si=Tm-79lGXQIaxLOWTPDIaag" target="_blank">Spotify</a>

<a href="https://music.apple.com/in/artist/the-sukoon-lab/1896591943?at=11l65W&ct=push" target="_blank">Apple Music</a>

<a href="https://music.amazon.in/artists/B0H1J21VB8/the-sukoon-lab" target="_blank">Amazon Music</a>

<a href="https://www.jiosaavn.com/artist/the-sukoon-lab-albums/Js5HpaOPerA_" target="_blank">JioSaavn</a>

<a href="https://www.youtube.com/@TheSukoonLab" target="_blank">YouTube</a>

<a href="https://www.instagram.com/the.sukoon.lab" target="_blank">Instagram</a>

<a href="https://x.com/thesukoonlab" target="_blank">X (Twitter)</a>

</div>

</section>

<footer>

© The Sukoon Lab

</footer>

</body>
</html>
